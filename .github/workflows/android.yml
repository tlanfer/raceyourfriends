name: Android Internal Testing

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-beta*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static SvelteKit app
        run: npm run build:cap
        env:
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Add and sync Capacitor Android platform
        run: npx cap add android && npx cap sync android

      - name: Generate app icons and splash screens
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#0B090B' --iconBackgroundColorDark '#0B090B' --splashBackgroundColor '#0B090B' --splashBackgroundColorDark '#0B090B'

      - uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # v1.0.0-beta.1 → 1.0.0
          VERSION_NAME=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*//')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Patch build.gradle with signing config
        run: |
          cat > /tmp/signing-patch.py << 'PYEOF'
          import re

          with open("android/app/build.gradle") as f:
              content = f.read()

          # Add keystore path variable after the plugin line
          content = content.replace(
              "apply plugin: 'com.android.application'",
              "apply plugin: 'com.android.application'\n\ndef keystorePath = System.getenv(\"ANDROID_KEYSTORE_PATH\")"
          )

          # Add versionCode/versionName from env vars in defaultConfig
          content = content.replace(
              'versionCode 1',
              'versionCode (System.getenv("ANDROID_VERSION_CODE") ?: "1").toInteger()'
          )
          content = content.replace(
              "versionName \"1.0\"",
              'versionName System.getenv("ANDROID_VERSION_NAME") ?: "1.0"'
          )

          # Add signingConfigs block and wire it into release buildType
          signing_config = """
    if (keystorePath) {
        signingConfigs {
            release {
                storeFile file(keystorePath)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }

"""
          # Insert signingConfigs before buildTypes
          content = content.replace("    buildTypes {", signing_config + "    buildTypes {")

          # Add signingConfig to release buildType
          content = content.replace(
              "            minifyEnabled false",
              "            if (keystorePath) {\n                signingConfig signingConfigs.release\n            }\n            minifyEnabled false"
          )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          PYEOF
          python3 /tmp/signing-patch.py

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.raceyourfriends.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          releaseName: ${{ github.ref_name }}

      - name: Summary
        run: |
          echo "## Android Internal Testing Upload" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ✅ Uploaded to Internal Testing track" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Testers on the internal testing list can install via the opt-in link." >> "$GITHUB_STEP_SUMMARY"
